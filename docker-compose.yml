version: '3.8'
services:
  mariadb:
    image: mariadb:11.3
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: thucs2pl_db
      MARIADB_USER: thucs2pl
      MARIADB_PASSWORD: thucs2plpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: .
    depends_on:
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: thucs2pl
      DB_PASSWORD: thucs2plpass
      DB_NAME: thucs2pl_db
    ports:
      - "8000:8000"
    restart: always
#    volumes:
#      - .:/app

volumes:
  mariadb_data:

